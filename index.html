<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trek Title Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="picker-screen" class="container">
        <h1>STAR TREK TITLE GENERATOR</h1>
        <div class="show-grid">
            <div class="show-card" onclick="openEditor('The Original Series', 'TOS')">
                <div class="img-container"><img src="images/TOS.jpg"></div>
                <div class="show-name">THE ORIGINAL SERIES</div>
            </div>
            <div class="show-card" onclick="openEditor('The Animated Series', 'TAS')">
                <div class="img-container"><img src="images/TAS.jpg"></div>
                <div class="show-name">THE ANIMATED SERIES</div>
            </div>
            <div class="show-card" onclick="openEditor('The Next Generation', 'TNG')">
                <div class="img-container"><img src="images/tng.jpg"></div>
                <div class="show-name">THE NEXT GENERATION</div>
            </div>
            <div class="show-card" onclick="openEditor('Deep Space 9', 'DS9')">
                <div class="img-container"><img src="images/ds9.jpg"></div>
                <div class="show-name">DEEP SPACE 9</div>
            </div>
            <div class="show-card" onclick="openEditor('Voyager', 'VOY')">
                <div class="img-container"><img src="images/voy.jpg"></div>
                <div class="show-name">VOYAGER</div>
            </div>
        </div>
    </div>

    <div id="editor-screen" class="container">
        <div class="toolbar">
            <button class="btn-back" onclick="goBack()">BACK</button>
            <h2 id="series-display-name"></h2>
        </div>
        <div class="editor-layout">
            <div class="controls">
                <div class="input-group">
                    <label>EPISODE TITLE</label>
                    <input type="text" id="user-title" placeholder="ENTER TITLE...">
                </div>
                <div class="input-group">
                    <label>TEMPLATE</label>
                    <select id="template-select" onchange="generateCard()"></select>
                </div>
                <div class="button-row">
                    <button class="btn-engage" onclick="generateCard()">ENGAGE</button>
                    <button class="btn-download" onclick="downloadImage()">DOWNLOAD</button>
                </div>
            </div>
            <canvas id="titleCanvas"></canvas>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
